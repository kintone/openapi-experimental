get:
    tags:
      - Record
    summary: Get a Record
    description: Retrieves a record from Kintone.
    operationId: getRecord
    parameters:
      - name: app
        in: query
        required: true
        schema:
          type:
            - integer
            - string
        description: The App ID.
      - name: id
        in: query
        required: true
        schema:
          type:
            - integer
            - string
        description: The Record ID.
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              type: object
              properties:
                record:
                  type: object
                  additionalProperties:
                    type: object
                    properies:
                      type:
                        type: string
                      value:
                        type:
                          - object:
                            additionalProperties: true
                          - string
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
      '404':
        description: Record not found
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
post:
    tags:
      - Record
    summary: Add a Record
    description: Adds a record to Kintone.
    operationId: addRecord
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              app:
                type: integer
                description: The App ID.
              record:
                type: object
                description: The record to add.
                additionalProperties:
                  type: object
                  properties:
                    value:
                      type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: The ID of the added record.
                revision:
                  type: string
                  description: The revision number of the added record.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
      '404':
        description: App not found
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/KintoneRestApiError.yaml'
